  ⚠️ CREDIT LIMIT: $5 per model (Claude & Gemini)
  
  Conservation strategies:
  1. Test with cheaper models first (glm-flash, open-fast)
  2. Use shorter test queries during development
  3. Limit test iterations to 3-5 per agent
  4. Monitor usage after each test batch
  5. Switch to production testing only after validation
  
  Current costs per 1K tokens:
